name: CI
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      docker_chaos:
        description: "Run guarded Docker daemon chaos scenarios"
        required: false
        default: "false"
  schedule:
    - cron: "17 3 * * 0"

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - run: bash scripts/check-architecture.sh
      - run: bash scripts/check-diagnostics.sh
      - run: bash scripts/check-schemas.sh
      - run: bash scripts/check-release-policy.sh
      - run: bash scripts/check-package-readiness.sh
      - run: bash scripts/check-real-world-catalog.sh
      - run: bash scripts/check-release-readiness.sh
      - run: bash scripts/check-sdk-readiness.sh
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

  test-stable:
    name: Test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace
      - run: cargo test --doc --workspace

  test-msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.85
      - run: cargo check --workspace --all-targets

  features:
    name: Feature combinations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check -p susun-model --no-default-features
      - run: cargo check -p susun-model --features serde
      - run: cargo test  -p susun-model --features serde

  supply-chain:
    name: Supply chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses sources
      - run: cargo install cargo-audit --version 0.22.1 --locked
      - run: cargo audit

  semver:
    name: Semver
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-semver-checks --version 0.48.0 --locked
      - run: bash scripts/check-semver.sh

  compatibility:
    name: Compatibility artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: bash scripts/run-compatibility-matrix.sh
      - run: bash scripts/generate-release-docs.sh
      - run: git diff --exit-code -- docs/generated/capability-and-compatibility.md
      - uses: actions/upload-artifact@v4
        with:
          name: compatibility-report
          path: target/compatibility

  benchmarks:
    name: Benchmark compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo bench --workspace --no-run

  docker-integration:
    name: Docker integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: bash scripts/run-docker-integration.sh

  docker-chaos:
    name: Docker chaos
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.docker_chaos == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: SUSUN_DOCKER_CHAOS=1 bash scripts/run-docker-chaos.sh

  convergence-integration:
    name: Convergence integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: bash scripts/run-convergence-integration.sh

  fuzz-smoke:
    name: Fuzz smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-fuzz --version 0.13.1 --locked
      - run: bash scripts/run-fuzz-smoke.sh

  platform:
    name: Platform (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --workspace --all-targets
