name: CI
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - run: bash scripts/check-architecture.sh
      - run: bash scripts/check-diagnostics.sh
      - run: bash scripts/check-schemas.sh
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

  test-stable:
    name: Test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace
      - run: cargo test --doc --workspace

  test-msrv:
    name: Test (MSRV 1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.85
      - run: cargo check --workspace --all-targets
      - run: cargo test --workspace

  features:
    name: Feature combinations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check -p susun-model --no-default-features
      - run: cargo check -p susun-model --features serde
      - run: cargo test  -p susun-model --features serde

  supply-chain:
    name: Supply chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses sources
      - run: cargo install cargo-audit --version 0.22.1 --locked
      - run: cargo audit

  compatibility:
    name: Compatibility artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: bash scripts/run-compatibility-matrix.sh
      - uses: actions/upload-artifact@v4
        with:
          name: compatibility-report
          path: target/compatibility

  benchmarks:
    name: Benchmark compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo bench --workspace --no-run

  docker-integration:
    name: Docker integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: bash scripts/run-docker-integration.sh

  convergence-integration:
    name: Convergence integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: bash scripts/run-convergence-integration.sh

  platform:
    name: Platform (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --workspace --all-targets
