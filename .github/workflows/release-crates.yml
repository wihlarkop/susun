name: Release crates

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      crate:
        description: "Publish only this crate at its current workspace version (leave empty for a full dry-run of the lockstep publish order)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-crates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish crates.io release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - run: cargo install cargo-deny --version 0.18.3 --locked
      - run: cargo install cargo-semver-checks --version 0.48.0 --locked
      - run: bash scripts/gate-release.sh
      - name: Publish crates
        if: github.event_name == 'push'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: bash scripts/publish-crates.sh
      - name: Publish single crate
        if: github.event_name == 'workflow_dispatch' && inputs.crate != ''
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p "${{ inputs.crate }}" --locked
      - name: Dry-run publish order
        if: github.event_name == 'workflow_dispatch' && inputs.crate == ''
        env:
          SUSUN_PUBLISH_DRY_RUN: "1"
        run: bash scripts/publish-crates.sh
