name: Release crates

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-crates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish crates.io release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - run: cargo install cargo-audit --version 0.22.1 --locked
      - run: cargo install cargo-deny --version 0.18.3 --locked
      - run: cargo install cargo-semver-checks --version 0.48.0 --locked
      - run: bash scripts/gate-release.sh
      - name: Publish crates
        if: github.event_name == 'push'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: bash scripts/publish-crates.sh
      - name: Dry-run publish order
        if: github.event_name == 'workflow_dispatch'
        env:
          SUSUN_PUBLISH_DRY_RUN: "1"
        run: bash scripts/publish-crates.sh
