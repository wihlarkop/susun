name: compat-profiled-web
services:
  web:
    image: nginx:1.27-alpine
    command: ["nginx", "-g", "daemon off;"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      API_BASE_URL: http://api:8080
    labels:
      com.example.stack: profiled-web
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - web-cache:/var/cache/nginx
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  api:
    image: alpine:3.20
    command: ["sh", "-c", "sleep 60"]
    environment:
      DATABASE_URL: postgres://app@db/app
    profiles:
      - dev
    networks:
      - backend

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: synthetic-password
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  frontend: {}
  backend: {}

volumes:
  web-cache: {}
  db-data: {}
